# ══════════════════════════════════════════════════
#  REMI8 Engine - GitHub Actions بناء APK تلقائي
# ══════════════════════════════════════════════════
name: "REMI8 - بناء وإصدار APK"

on:
  push:
    branches: [ main, master, develop ]
    tags: [ 'v*.*.*' ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'نوع البناء'
        required: true
        default: 'debug'
        type: choice
        options: [debug, release, both]

env:
  JAVA_VERSION: '17'
  ANDROID_COMPILE_SDK: '34'
  ANDROID_BUILD_TOOLS: '34.0.0'
  ANDROID_MIN_SDK: '26'

jobs:
  # ─── فحص جودة الكود ───
  lint:
    name: "فحص جودة الكود"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: "تنزيل gradle-wrapper.jar الحقيقي"
        run: |
          mkdir -p gradle/wrapper
          curl -fsSL \
            "https://raw.githubusercontent.com/gradle/gradle/v8.4.0/gradle/wrapper/gradle-wrapper.jar" \
            -o gradle/wrapper/gradle-wrapper.jar \
          || curl -fsSL \
            "https://services.gradle.org/distributions/gradle-8.4-wrapper.jar" \
            -o gradle/wrapper/gradle-wrapper.jar \
          || true
          # إذا فشل التنزيل، استخدم Gradle المثبّت
          if [ ! -s gradle/wrapper/gradle-wrapper.jar ]; then
            echo "سيستخدم GitHub Actions النسخة المثبتة من Gradle"
          fi

      - name: "منح صلاحيات gradlew"
        run: chmod +x gradlew

      - name: "تخزين Gradle مؤقتاً"
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: "تشغيل Lint"
        run: ./gradlew lint --no-daemon --stacktrace

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lint-report
          path: app/build/reports/lint-results*.html
          retention-days: 7

  # ─── بناء APK Debug ───
  build-debug:
    name: "بناء APK - Debug"
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - uses: android-actions/setup-android@v3

      - name: "تنزيل gradle-wrapper.jar"
        run: |
          mkdir -p gradle/wrapper
          curl -fsSL \
            "https://raw.githubusercontent.com/gradle/gradle/v8.4.0/gradle/wrapper/gradle-wrapper.jar" \
            -o gradle/wrapper/gradle-wrapper.jar || true

      - run: chmod +x gradlew

      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*') }}

      - name: "بناء APK Debug"
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: "إعادة تسمية APK"
        run: |
          mkdir -p artifacts
          find app/build/outputs/apk/debug -name "*.apk" \
            -exec cp {} "artifacts/REMI8-Engine-debug-$(echo $GITHUB_SHA | cut -c1-8).apk" \;

      - uses: actions/upload-artifact@v4
        with:
          name: REMI8-Debug-APK
          path: artifacts/*.apk
          retention-days: 14

  # ─── بناء APK Release ───
  build-release:
    name: "بناء APK - Release"
    runs-on: ubuntu-latest
    needs: lint
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - uses: android-actions/setup-android@v3

      - name: "تنزيل gradle-wrapper.jar"
        run: |
          mkdir -p gradle/wrapper
          curl -fsSL \
            "https://raw.githubusercontent.com/gradle/gradle/v8.4.0/gradle/wrapper/gradle-wrapper.jar" \
            -o gradle/wrapper/gradle-wrapper.jar || true

      - run: chmod +x gradlew

      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*') }}

      - name: "إنشاء Keystore للتوقيع"
        if: ${{ env.KEYSTORE_BASE64 != '' }}
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_BASE64" | base64 -d > app/remi8.keystore

      - name: "بناء APK Release"
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          if [ -f app/remi8.keystore ]; then
            ./gradlew assembleRelease --no-daemon \
              -Pandroid.injected.signing.store.file=remi8.keystore \
              -Pandroid.injected.signing.store.password="$KEYSTORE_PASSWORD" \
              -Pandroid.injected.signing.key.alias="$KEY_ALIAS" \
              -Pandroid.injected.signing.key.password="$KEY_PASSWORD"
          else
            ./gradlew assembleRelease --no-daemon
          fi

      - name: "إعادة تسمية APK"
        run: |
          mkdir -p artifacts
          VERSION=$(grep 'versionName' app/build.gradle | head -1 | grep -oP '"\K[^"]+')
          find app/build/outputs/apk/release -name "*.apk" \
            -exec cp {} "artifacts/REMI8-Engine-v${VERSION}-release.apk" \; || true

      - uses: actions/upload-artifact@v4
        with:
          name: REMI8-Release-APK
          path: artifacts/*.apk
          retention-days: 30

  # ─── إصدار GitHub تلقائي عند وجود Tag ───
  release:
    name: "إنشاء GitHub Release"
    runs-on: ubuntu-latest
    needs: [build-debug, build-release]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: REMI8-Debug-APK
          path: release-files/

      - uses: actions/download-artifact@v4
        with:
          name: REMI8-Release-APK
          path: release-files/
        continue-on-error: true

      - id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: "إنشاء GitHub Release"
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.get_version.outputs.VERSION }}
          name: "🎮 REMI8 Engine ${{ steps.get_version.outputs.VERSION }}"
          body: |
            ## 🎮 REMI8 Engine — ${{ steps.get_version.outputs.VERSION }}
            
            ### محرك الألعاب ثنائي الأبعاد بلغة remiscript العربية
            
            **المميزات:**
            - ✅ محرك REMI8 كامل 60 FPS
            - ✅ لغة remiscript — برمجة بالعربية
            - ✅ محرك فيزياء + تصادمات
            - ✅ نظام جسيمات + رسوم متحركة
            - ✅ خرائط بلاطات TileMap
            - ✅ دعم Android 8.0+ (API 26+)
            
            **مثال remiscript:**
            ```
            دالة تحديث(دت) {
                إذا (مدخل.زر("يمين")) {
                    هذا.س += 300 * دت
                }
                إذا (مدخل.زر("قفز") و هذا.علىالأرض) {
                    هذا.قفز(500)
                }
            }
            ```
          files: release-files/*.apk
          draft: false
          prerelease: ${{ contains(steps.get_version.outputs.VERSION, 'beta') || contains(steps.get_version.outputs.VERSION, 'alpha') }}
