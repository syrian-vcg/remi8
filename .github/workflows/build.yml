# ══════════════════════════════════════════════════
#  REMI8 Engine - GitHub Actions بناء APK تلقائي
# ══════════════════════════════════════════════════
name: "REMI8 - بناء وإصدار APK"

on:
  push:
    branches: [ main, master, develop ]
    tags: [ 'v*.*.*' ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'نوع البناء (debug/release)'
        required: true
        default: 'debug'
        type: choice
        options: [debug, release, both]

env:
  JAVA_VERSION: '17'

jobs:
  # ─── فحص وبناء Debug ───
  build-debug:
    name: "بناء APK - Debug"
    runs-on: ubuntu-latest
    steps:
      - name: "سحب الكود"
        uses: actions/checkout@v4

      - name: "إعداد Java 17"
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: "إعداد Android SDK"
        uses: android-actions/setup-android@v3

      - name: "تنزيل gradle-wrapper.jar الحقيقي"
        run: |
          mkdir -p gradle/wrapper
          # تنزيل JAR الحقيقي من GitHub الرسمي لـ Gradle
          curl -fsSL \
            "https://github.com/gradle/gradle/raw/v8.4.0/gradle/wrapper/gradle-wrapper.jar" \
            -o gradle/wrapper/gradle-wrapper.jar
          echo "حجم gradle-wrapper.jar: $(du -sh gradle/wrapper/gradle-wrapper.jar)"

      - name: "منح صلاحيات gradlew"
        run: chmod +x gradlew

      - name: "تخزين Gradle مؤقتاً"
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: "فحص Lint"
        run: ./gradlew lint --no-daemon --stacktrace

      - name: "بناء APK Debug"
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: "رفع APK Debug"
        uses: actions/upload-artifact@v4
        with:
          name: REMI8-Debug-APK
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 14

      - name: "رفع تقرير Lint"
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lint-report
          path: app/build/reports/lint-results*.html
          retention-days: 7

  # ─── بناء APK Release ───
  build-release:
    name: "بناء APK - Release"
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - uses: android-actions/setup-android@v3

      - name: "تنزيل gradle-wrapper.jar"
        run: |
          mkdir -p gradle/wrapper
          curl -fsSL \
            "https://github.com/gradle/gradle/raw/v8.4.0/gradle/wrapper/gradle-wrapper.jar" \
            -o gradle/wrapper/gradle-wrapper.jar

      - run: chmod +x gradlew

      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*') }}

      - name: "إعداد Keystore للتوقيع"
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > app/remi8.keystore
          else
            echo "لا يوجد Keystore — سيتم البناء بدون توقيع"
          fi

      - name: "بناء APK Release"
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          if [ -f app/remi8.keystore ]; then
            ./gradlew assembleRelease --no-daemon \
              -Pandroid.injected.signing.store.file=remi8.keystore \
              -Pandroid.injected.signing.store.password="$KEYSTORE_PASSWORD" \
              -Pandroid.injected.signing.key.alias="$KEY_ALIAS" \
              -Pandroid.injected.signing.key.password="$KEY_PASSWORD"
          else
            ./gradlew assembleRelease --no-daemon
          fi

      - name: "رفع APK Release"
        uses: actions/upload-artifact@v4
        with:
          name: REMI8-Release-APK
          path: app/build/outputs/apk/release/*.apk
          retention-days: 30

  # ─── GitHub Release تلقائي عند Tag ───
  release:
    name: "إنشاء GitHub Release"
    runs-on: ubuntu-latest
    needs: [build-debug, build-release]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: REMI8-Debug-APK
          path: release-files/

      - uses: actions/download-artifact@v4
        with:
          name: REMI8-Release-APK
          path: release-files/
        continue-on-error: true

      - id: version
        run: echo "TAG=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.TAG }}
          name: "🎮 REMI8 Engine ${{ steps.version.outputs.TAG }}"
          body: |
            ## 🎮 REMI8 Engine — ${{ steps.version.outputs.TAG }}
            محرك الألعاب ثنائي الأبعاد بلغة **remiscript** العربية

            **المميزات:**
            - ✅ محرك REMI8 كامل 60 FPS
            - ✅ لغة remiscript — برمجة بالعربية والإنجليزية
            - ✅ محرك فيزياء + تصادمات AABB
            - ✅ نظام جسيمات + رسوم متحركة Sprite
            - ✅ خرائط بلاطات TileMap
            - ✅ كاميرا متقدمة Camera2D
            - ✅ دعم Android 8.0+ (API 26+)

            **مثال remiscript:**
            ```
            دالة تحديث(دت) {
                إذا (مدخل.زر("يمين")) {
                    هذا.س += 300 * دت
                }
                إذا (مدخل.زر("قفز") و هذا.علىالأرض) {
                    هذا.قفز(500)
                    صوت.شغّل("قفز")
                }
            }
            ```
          files: release-files/*.apk
          draft: false
          prerelease: ${{ contains(steps.version.outputs.TAG, 'beta') || contains(steps.version.outputs.TAG, 'alpha') }}
