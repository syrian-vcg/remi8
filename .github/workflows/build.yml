# ══════════════════════════════════════════════════
#  REMI8 Engine - GitHub Actions بناء APK تلقائي
# ══════════════════════════════════════════════════
name: "REMI8 - بناء وإصدار APK"

on:
  push:
    branches: [ main, master, develop ]
    tags: [ 'v*.*.*' ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'نوع البناء'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release
          - both

env:
  JAVA_VERSION: '17'
  ANDROID_COMPILE_SDK: '34'
  ANDROID_BUILD_TOOLS: '34.0.0'
  ANDROID_MIN_SDK: '26'

jobs:
  # ─── فحص جودة الكود ───
  lint:
    name: "فحص جودة الكود"
    runs-on: ubuntu-latest
    steps:
      - name: "سحب الكود"
        uses: actions/checkout@v4

      - name: "إعداد Java ${{ env.JAVA_VERSION }}"
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'gradle'

      - name: "منح صلاحيات Gradle"
        run: chmod +x gradlew

      - name: "تخزين Gradle مؤقتاً"
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: "تشغيل Lint"
        run: ./gradlew lint

      - name: "رفع تقرير Lint"
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lint-report
          path: app/build/reports/lint-results*.html

  # ─── بناء APK Debug ───
  build-debug:
    name: "بناء APK - Debug"
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: "سحب الكود"
        uses: actions/checkout@v4

      - name: "إعداد Java"
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'gradle'

      - name: "إعداد Android SDK"
        uses: android-actions/setup-android@v3

      - name: "منح صلاحيات Gradle"
        run: chmod +x gradlew

      - name: "تخزين Gradle مؤقتاً"
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*') }}

      - name: "بناء APK Debug"
        run: ./gradlew assembleDebug --stacktrace

      - name: "إعادة تسمية APK"
        run: |
          mkdir -p artifacts
          cp app/build/outputs/apk/debug/app-debug.apk \
             artifacts/REMI8-Engine-debug-${{ github.sha }}.apk

      - name: "رفع APK Debug"
        uses: actions/upload-artifact@v4
        with:
          name: REMI8-Debug-APK
          path: artifacts/REMI8-Engine-debug-*.apk
          retention-days: 14

  # ─── بناء APK Release ───
  build-release:
    name: "بناء APK - Release"
    runs-on: ubuntu-latest
    needs: lint
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: "سحب الكود"
        uses: actions/checkout@v4

      - name: "إعداد Java"
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'gradle'

      - name: "إعداد Android SDK"
        uses: android-actions/setup-android@v3

      - name: "منح صلاحيات Gradle"
        run: chmod +x gradlew

      - name: "تخزين Gradle مؤقتاً"
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*') }}

      - name: "إنشاء Keystore للتوقيع"
        if: env.KEYSTORE_BASE64 != ''
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > app/remi8.keystore

      - name: "بناء APK Release (موقّع)"
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          if [ -f app/remi8.keystore ]; then
            ./gradlew assembleRelease \
              -Pandroid.injected.signing.store.file=remi8.keystore \
              -Pandroid.injected.signing.store.password="$KEYSTORE_PASSWORD" \
              -Pandroid.injected.signing.key.alias="$KEY_ALIAS" \
              -Pandroid.injected.signing.key.password="$KEY_PASSWORD"
          else
            echo "لا يوجد keystore - بناء release غير موقّع"
            ./gradlew assembleRelease
          fi

      - name: "إعادة تسمية APK"
        run: |
          mkdir -p artifacts
          VERSION=$(grep versionName app/build.gradle | head -1 | awk -F'"' '{print $2}')
          cp app/build/outputs/apk/release/app-release*.apk \
             "artifacts/REMI8-Engine-v${VERSION}-release.apk" || true

      - name: "رفع APK Release"
        uses: actions/upload-artifact@v4
        with:
          name: REMI8-Release-APK
          path: artifacts/REMI8-Engine-*-release.apk
          retention-days: 30

  # ─── إصدار تلقائي عند وجود Tag ───
  release:
    name: "إنشاء إصدار GitHub"
    runs-on: ubuntu-latest
    needs: [ build-debug, build-release ]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: "سحب الكود"
        uses: actions/checkout@v4

      - name: "تنزيل APK Debug"
        uses: actions/download-artifact@v4
        with:
          name: REMI8-Debug-APK
          path: release-files/

      - name: "تنزيل APK Release"
        uses: actions/download-artifact@v4
        with:
          name: REMI8-Release-APK
          path: release-files/
        continue-on-error: true

      - name: "استخراج رقم الإصدار"
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: "إنشاء ملاحظات الإصدار"
        id: release_notes
        run: |
          cat > release_notes.md << 'EOF'
          ## 🎮 REMI8 Engine - ${{ steps.get_version.outputs.VERSION }}

          ### محرك الألعاب ثنائي الأبعاد بلغة remiscript العربية

          #### ✨ مميزات هذا الإصدار:
          - 🔴 محرك REMI8 كامل للألعاب 2D
          - 📝 لغة remiscript - برمجة ألعاب بالعربية
          - ⚡ محرك فيزياء مدمج
          - 🎵 دعم الصوت والموسيقى
          - 📱 يدعم Android 8.0+ (API 26+)
          - 🛠 محرر مرئي كامل

          #### 📦 ملفات التثبيت:
          | الملف | الوصف |
          |-------|-------|
          | `*-release.apk` | نسخة الإصدار (موصى بها) |
          | `*-debug.apk` | نسخة التطوير |

          #### 📖 مثال remiscript:
          ```remiscript
          دالة تحديث(دت) {
              إذا (مدخل.زر("يمين")) {
                  هذا.س += 300 * دت
              }
              إذا (مدخل.زر("قفز") و هذا.علىالأرض) {
                  هذا.قفز(500)
              }
          }
          ```
          EOF

      - name: "إنشاء GitHub Release"
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.get_version.outputs.VERSION }}
          name: "🎮 REMI8 Engine ${{ steps.get_version.outputs.VERSION }}"
          body_path: release_notes.md
          files: release-files/*.apk
          draft: false
          prerelease: ${{ contains(steps.get_version.outputs.VERSION, 'beta') || contains(steps.get_version.outputs.VERSION, 'alpha') }}
